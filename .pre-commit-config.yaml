# See https://pre-commit.com for more information
repos:
  - repo: local
    hooks:
      - id: ruff-fix
        name: Ruff Lint Fix
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: Ruff Format
        entry: uv run ruff format .
        language: system
        types: [python]
      - id: warn-unstaged-claude
        name: Unstaged .claude/ changes
        entry: python .pre-commit-scripts/check_unstaged_claude.py
        language: system
        pass_filenames: false
        always_run: true
